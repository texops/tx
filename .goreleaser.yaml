version: 2

builds:
  - main: ./cmd/tx
    binary: tx
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "tx_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: LICENSE
      - src: README.md
      - src: man/tx.1
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc

brews:
  - repository:
      owner: texops
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: tx
    homepage: "https://github.com/texops/tx"
    description: "CLI for TexOps"
    license: "MIT"
    install: |
      bin.install "tx"
      man1.install "man/tx.1"
    test: |
      system "#{bin}/tx", "--version"
